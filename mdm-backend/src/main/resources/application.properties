# Database — Railway provides PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:mdm_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — tuned for Railway free PostgreSQL (max 25 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server — Railway sets PORT env var; address must be 0.0.0.0 for Railway to route traffic
server.port=${PORT:8080}
server.address=0.0.0.0
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Logging — INFO in production (DEBUG floods Railway logs and causes memory pressure)
logging.level.root=WARN
logging.level.com.mdm=INFO

# Serialize LocalDateTime as ISO-8601 string (not array) so mobile can parse it
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
